syntax = "proto3";

option csharp_namespace = "SharedContracts.Protos";

package event;

import "google/protobuf/timestamp.proto";

service EventGrpc {
  rpc GetEventDetail (EventRequest) returns (EventResponse);
  rpc GetOrganizerStatus (OrganizerStatusRequest) returns (OrganizerStatusResponse);
  rpc GetAdminOverview (AdminOverviewRequest) returns (AdminOverviewResponse);
  rpc GetOrganizerOverview (OrganizerOverviewRequest) returns (OrganizerOverviewResponse);
  rpc GetEventIdsByOrganizer(GetEventIdsByOrganizerRequest) returns (GetEventIdsByOrganizerResponse);
}

message GetEventIdsByOrganizerRequest {
  string organizer_id = 1;
}

message GetEventIdsByOrganizerResponse {
  repeated string event_ids = 1;
}

message EventRequest {
  string event_id = 1;
}

enum EventStatus {
  EVENT_STATUS_UNSPECIFIED = 0;
  DRAFT = 1;
  PUBLISHED = 2;
  CANCELLED = 3;
  COMPLETED = 4;
}

message EventResponse {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string tags = 5;
  google.protobuf.Timestamp start_time = 6;
  google.protobuf.Timestamp end_time = 7;
  string open_time = 8;
  string closed_time = 9;
  EventStatus status = 11;
  string thumbnail_url = 12;
  string banner_url = 13;
  int32 age_restriction = 14;
}

message OrganizerStatusRequest {
  string organizer_id = 1;
}

message OrganizerStatusResponse {
  bool is_verified = 1;
  int32 status = 2;
}

message AdminOverviewRequest {
  string from_date = 1;  // ISO date, optional
  string to_date = 2;    // ISO date, optional
  string period = 3;     // "7d" | "30d" | "90d", default "30d"
}
message AdminOverviewResponse {
  int32 total_events = 1;
  int32 total_organizers = 2;
  int32 pending_organizers = 3;
  int32 active_events = 4;
  int32 pending_events = 5;
}

message OrganizerOverviewRequest {
  string organizer_id = 1;
  string period = 2;  // "7d" | "30d", default "30d"
}
message OrganizerOverviewResponse {
  string organizer_id = 1;
  int32 total_events = 2;
  int32 opened_events_count = 3;
  int32 upcoming_published_count = 4;
  repeated OrganizerRecentEventItem recent_events = 5;
}
message OrganizerRecentEventItem {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp start_time = 3;
  int32 status = 4;
  double revenue = 5;
  int32 sold_count = 6;
  int32 total_capacity = 7;
  double occupancy_percent = 8;
}