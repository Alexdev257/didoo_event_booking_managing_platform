syntax = "proto3";

option csharp_namespace = "SharedContracts.Protos";

package ticket;

service TicketGrpc {
  // Hàm lấy chi tiết vé
  rpc GetTicketDetail (GetTicketDetailRequest) returns (GetTicketDetailResponse);
}

message GetTicketDetailRequest {
  string ticket_id = 1;
}

message GetTicketDetailResponse {
  bool is_success = 1;
  string message = 2;
  TicketModel ticket_data = 3;
}

// Model chi tiết của Ticket
message TicketModel {
  string id = 1;
  string event_id = 2;
  string zone = 3;
  string status = 4;
  string owner_id = 5; // Có thể null hoặc rỗng
  TicketTypeModel ticket_type = 6; // Lồng object TicketType vào
}

// Model chi tiết của TicketType
message TicketTypeModel {
  string id = 1;
  string name = 2;
  double price = 3; // Proto không có decimal, dùng double hoặc string
  string description = 4;
}